{% load static %}
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
      </head>
    <body>
        <div class="dropdown">
  <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
    Dropdown button
  </button>
  <ul class="dropdown-menu">
    <li><a class="dropdown-item" href="{% url 'login' %}">Login</a></li>
    <li><a class="dropdown-item" href="{% url 'register' %}">Register</a></li>
    <li>
    {% if user.is_authenticated %}
    <a class="dropdown-item" href="{% url 'students' %}">View Students</a>
    {% endif %}</li>
  </ul>
</div>

    <div class="container text-center">
  <div class="row">
    <div class="col box">
      Academics
    </div>
    <div class="col box">
      extracurriculars
    </div>
    <div class="col box">
      Hostels
    </div>
  </div>
</div>

    <div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div id="carouselExampleIndicators" class="carousel slide shadow rounded">

                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
                </div>

                <div class="carousel-inner">

                    <div class="carousel-item active">
                        <img src="{% static 'images/academics.jfif' %}" class="d-block w-100" style="height: 350px; object-fit: cover;">
                    </div>

                    <div class="carousel-item">
                        <img src="{% static 'images/extracurriculars.jfif' %}" class="d-block w-100" style="height: 350px; object-fit: cover;">
                    </div>

                    <div class="carousel-item">
                        <img src="{% static 'images/hostels.jfif' %}" class="d-block w-100" style="height: 350px; object-fit: cover;">
                    </div>

                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>

            </div>

        </div>
    </div>
</div>
