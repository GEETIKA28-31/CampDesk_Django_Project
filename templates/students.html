<!DOCTYPE html>
<html>
<head>
    <title>Students</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ ADD THIS HERE -->
    <style>
        .card:hover {
            transform: scale(1.03);
            transition: 0.2s;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">Student Profiles</h2>
    <a href="/logout/" class="btn btn-danger btn-sm">Logout</a>
    <a href="/saved/" class="btn btn-success btn-sm">Saved Students</a>

    <!-- ADD STUDENT FORM (SMALL) -->
    <div class="card p-3 mb-4 shadow-sm" style="max-width:500px; margin:auto;">
        <h5>Add Student</h5>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-2">
                <label>Name</label>
                {{ form.name }}
            </div>

            <div class="mb-2">
                <label>Roll</label>
                {{ form.roll }}
            </div>

            <div class="mb-2">
                <label>Branch</label>
                {{ form.branch }}
            </div>

            <div class="mb-2">
                <label>Email</label>
                {{ form.email }}
            </div>

            <div class="mb-2">
                <label>Image</label>
                {{ form.image }}
            </div>

            <button class="btn btn-primary btn-sm">Add</button>
        </form>
    </div>

    <!-- STUDENT LIST (HORIZONTAL LIKE SAVED) -->
    {% for s in students %}
    <div class="card mb-3 p-3 shadow-sm">

        <div class="d-flex align-items-center justify-content-between">

            <!-- LEFT SIDE -->
            <div class="d-flex align-items-center gap-3">

                <img src="{{ s.image.url }}"
                     width="60" height="60"
                     class="rounded-circle">

                <div>
                    <h6 class="mb-1">{{ s.name }}</h6>
                    <small class="text-muted">
                        {{ s.branch }} | {{ s.email }}
                    </small>
                </div>

            </div>

            <!-- RIGHT SIDE BUTTONS -->
            <div class="d-flex gap-2">

                <a href="{% url 'save_student' s.id %}"
                   class="btn btn-primary btn-sm">Save</a>

                <a href="{% url 'send_requests' s.id %}"
                   class="btn btn-success btn-sm">Send</a>

                <a href="{% url 'edit_student' s.id %}"
                   class="btn btn-warning btn-sm">Edit</a>

                <a href="{% url 'delete_student' s.id %}"
                   class="btn btn-danger btn-sm">Delete</a>

            </div>

        </div>

    </div>
    {% endfor %}

</div>

</body>
</html>
